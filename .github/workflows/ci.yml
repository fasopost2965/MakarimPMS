name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pms_makarim
          MYSQL_USER: pms
          MYSQL_PASSWORD: pms
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      # BullModule.forRoot() (app.module.ts) tente toujours une connexion
      # Redis au démarrage (file reporting/notifications) — son absence ici
      # a fait tourner en boucle infinie la reconnexion ioredis en arrière-
      # plan, empêchant le job "Tests e2e" de jamais se terminer (bloqué >35
      # min, jamais un simple flake). Mêmes host/port que le développement
      # local (backend/.env.example, docker-compose.yml).
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://pms:pms@127.0.0.1:3306/pms_makarim
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      # CH-004 — requise dans tous les environnements (assertEncryptionKeyConfigured,
      # backend/src/common/config/assert-strong-secrets.ts) : sans elle, le
      # bootstrap de PrismaModule échoue pour absolument tout test e2e (voir
      # guest-encryption.extension.ts). Valeur propre à CI, sans rapport avec
      # celle de backend/.env.example.
      ENCRYPTION_KEY: tJpZnGUKdaOOe3qhWB5ZfZnSH7jsuCqb3Npr6qBBrGA=
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Appliquer les migrations
        run: npx prisma migrate deploy

      - name: Charger les données de seed (comptes de test par rôle)
        run: npx prisma db seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tests unitaires
        run: npm test

      - name: Tests e2e (vraie base MySQL)
        run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build
